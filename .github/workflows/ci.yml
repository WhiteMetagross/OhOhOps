name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend test image
        run: docker build --target test -t ohohops-backend-test backend
      - name: Run backend tests with coverage
        run: >-
          docker run --rm
          -e DEPLOYMENT_MODE=local
          -e CHROMA_HOST=chromadb
          -v "${{ github.workspace }}:/workspace"
          -w /workspace/backend
          ohohops-backend-test
          python -m pytest
          --cov=app
          --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install browser test dependencies
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start complete mock stack
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
      - name: Wait for healthy services
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health > /dev/null &&
               curl --fail --silent http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps
          exit 1
      - name: Verify all network isolated language sandboxes
        run: docker exec -e PYTHONPATH=/app ohohops-backend-1 python scripts/test_all_sandboxes.py
      - name: Verify complete API, RAG, graph, ledger, and sandbox flow
        run: >-
          docker exec
          -e PYTHONPATH=/app
          -e OHOHOPS_API_KEY=ohohops-test-key
          ohohops-backend-1
          python scripts/test_full_stack.py
      - name: Run browser tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Show service logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs --no-color
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
